<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Tinted variant: monochrome black — iOS applies the user's chosen tint color -->
  <defs>
    <clipPath id="calClip">
      <rect x="202" y="236" width="620" height="574" rx="72"/>
    </clipPath>
  </defs>

  <!-- Background (will be tinted by iOS) -->
  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Calendar body -->
  <rect x="202" y="236" width="620" height="574" rx="72" fill="white" fill-opacity="0.18"/>
  <rect x="202" y="236" width="620" height="574" rx="72" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.25"/>

  <!-- Calendar header -->
  <rect x="202" y="236" width="620" height="148" rx="72" fill="white" fill-opacity="0.22" clip-path="url(#calClip)"/>
  <rect x="202" y="308" width="620" height="76" fill="white" fill-opacity="0.22" clip-path="url(#calClip)"/>

  <!-- Binding clips -->
  <rect x="362" y="188" width="56" height="112" rx="28" fill="white" fill-opacity="0.9"/>
  <rect x="606" y="188" width="56" height="112" rx="28" fill="white" fill-opacity="0.9"/>

  <!-- Date grid dots -->
  <g fill="white" fill-opacity="0.22">
    <circle cx="300" cy="460" r="10"/><circle cx="390" cy="460" r="10"/>
    <circle cx="480" cy="460" r="10"/><circle cx="570" cy="460" r="10"/>
    <circle cx="660" cy="460" r="10"/><circle cx="750" cy="460" r="10"/>
    <circle cx="300" cy="548" r="10"/><circle cx="750" cy="548" r="10"/>
    <circle cx="300" cy="636" r="10"/><circle cx="390" cy="636" r="10"/>
    <circle cx="750" cy="636" r="10"/>
  </g>

  <!-- Play button -->
  <polygon points="442,468 442,692 658,580" fill="white" fill-opacity="0.95"/>
</svg>
